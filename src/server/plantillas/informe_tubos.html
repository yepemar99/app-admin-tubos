<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <style>
      /* Configuración para impresión PDF */
      @page {
        size: A4;
        margin: 1cm;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #000080; /* Azul oscuro estilo Access */
        line-height: 1.4;
        padding-left: 10px;
        padding-right: 10px;
      }

      /* Encabezado */
      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .header h1 {
        font-style: italic;
        font-size: 28px;
        margin-bottom: 5px;
      }

      /* Tabla de datos */
      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 10px;
      }

      th {
        border-top: 2px solid #000080;
        border-bottom: 2px solid #000080;
        padding: 8px 0;
        font-style: italic;
      }

      td {
        padding: 8px 0;
      }

      /* Alineaciones */
      .text-right {
        text-align: right;
      }
      .text-left {
        text-align: left;
      }
      .text-center {
        text-align: center;
      }

      /* Gran Total */
      .grand-total {
        margin-top: 40px;
        border-top: 2px dashed #000080;
        border-bottom: 2px dashed #000080;
        padding: 10px 0;
        display: flex;
        justify-content: space-between;
        font-weight: bold;
        font-style: italic;
      }

      .grand-total-values {
        display: flex;
        gap: 40px; /* Espacio entre los valores del total */
      }

      /* Pie de página */
      .footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 30px;
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        font-style: italic;
        border-top: 1px solid #ccc;
        padding-top: 5px;
        background-color: white;
      }

      .footer-spacer {
        height: 40px;
      }

      tr {
        page-break-inside: avoid;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>{titulo}</h1>
    </div>

    <table>
      <thead>
        <tr>
          <th class="text-left" style="width: 25%">Calidad</th>
          <th class="text-left" style="width: 25%">Medida</th>
          <th class="text-right" style="width: 15%">Unidades</th>
          <th class="text-right" style="width: 15%">Paquetes</th>
          <th class="text-right" style="width: 20%">Peso (Tn)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="text-left">S235JR</td>
          <td class="text-left">1000 x 2000 x 3</td>
          <td class="text-right">50</td>
          <td class="text-right">2</td>
          <td class="text-right">2.35 Tn</td>
        </tr>
        <tr>
          <td class="text-left">S355J2</td>
          <td class="text-left">1500 x 3000 x 5</td>
          <td class="text-right">20</td>
          <td class="text-right">1</td>
          <td class="text-right">1.76 Tn</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="5">
            <div class="footer-spacer"></div>
          </td>
        </tr>
      </tfoot>
    </table>

    <div class="grand-total">
      <span>{resumenTitulo}</span>
      <div class="grand-total-values">
        <span>70 Uds.</span>
        <span>3 Paq.</span>
        <span>4.11 Tn</span>
      </div>
    </div>

    <div class="footer">
      <span id="fecha-footer">miércoles, 22 de abril de 2026</span>
      <span>Página 1 de 1</span>
    </div>
  </body>
</html>
